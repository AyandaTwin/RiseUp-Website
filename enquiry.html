<!-- Main content -->
<main>

    <h2>Enquiry Form</h2>

    <!-- Image for enquiry page -->
    <img src="images/enquiry.jpg.jpeg" alt="Youth engagement" width="300">

    <p>If you would like to get involved, support our programmes, or learn more, please complete the enquiry form below.</p>

    <form action="#" method="post">

        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>

        <label for="type">Enquiry Type:</label><br>
        <select id="type" name="type" required>
            <option value="">--Select--</option>
            <option value="volunteer">Volunteer</option>
            <option value="sponsor">Sponsor</option>
            <option value="programme">Programme Information</option>
        </select><br><br>

        <label for="message">Your Message:</label><br>
        <textarea id="message" name="message" rows="5" required></textarea><br><br>

        <button type="submit">Submit Enquiry</button>

    </form>

</main>
