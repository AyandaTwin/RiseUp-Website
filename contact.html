<!-- Main content -->
<main>

    <h2>Contact Us</h2>

    <!-- Image for contact page -->
    <img src="images/contact.jpg.jpeg" alt="Community support" width="300">

    <h3>Our Locations</h3>
    <p><strong>Johannesburg Office:</strong> 123 Main Street, Johannesburg</p>
    <p><strong>Soweto Branch:</strong> 45 Freedom Road, Soweto</p>

    <p><strong>Email:</strong> info@riseup.org</p>
    <p><strong>Phone:</strong> 012 345 6789</p>

    <h3>Send Us a Message</h3>

    <form action="#" method="post">

        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname" required><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="subject">Subject:</label><br>
        <select id="subject" name="subject" required>
            <option value="">--Select--</option>
            <option value="general">General Enquiry</option>
            <option value="support">Support</option>
            <option value="feedback">Feedback</option>
        </select><br><br>

        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="5" required></textarea><br><br>

        <button type="submit">Send Message</button>

    </form>

</main>
